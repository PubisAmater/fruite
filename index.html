<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Фруктики</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #2a1a0e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none;
            color: #fff;
        }
        #game-wrapper {
            position: relative;
            width: 420px;
            height: 720px;
        }
        canvas { display: block; border-radius: 8px; cursor: pointer; width: 100%; height: 100%; }
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.3s; z-index: 10;
        }
        .screen.hidden { display: none; }
        #menu-screen {
            background: linear-gradient(180deg, #8BA4D4 0%, #A8C0E0 40%, #D4C4A0 60%, #C4A070 100%);
            padding: 20px;
        }
        .game-title {
            font-size: 52px; font-weight: 900;
            color: #fff; text-shadow: 3px 3px 0 #C4A070, -1px -1px 0 rgba(0,0,0,0.1);
            margin-bottom: 8px; text-align: center;
        }
        .game-subtitle { font-size: 14px; color: rgba(255,255,255,0.8); margin-bottom: 24px; text-shadow: 1px 1px 2px rgba(0,0,0,0.2); }
        .leaderboard { width: 100%; max-width: 320px; margin-bottom: 28px; background: rgba(255,255,255,0.25); border-radius: 16px; padding: 16px; backdrop-filter: blur(5px); }
        .leaderboard h2 { font-size: 18px; color: #5a4030; margin-bottom: 10px; text-align: center; }
        .lb-table { width: 100%; border-collapse: collapse; }
        .lb-table th { font-size: 12px; color: #8a7060; text-transform: uppercase; letter-spacing: 1px; padding: 6px 8px; text-align: left; border-bottom: 1px solid rgba(0,0,0,0.1); }
        .lb-table th:last-child { text-align: right; }
        .lb-table td { padding: 8px; font-size: 15px; color: #4a3020; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .lb-table td:first-child { width: 30px; font-weight: bold; }
        .lb-table td:last-child { text-align: right; font-weight: bold; color: #e67e22; }
        .lb-empty { text-align: center; color: #8a7060; padding: 20px; font-size: 14px; }
        .btn-play {
            width: 160px; height: 160px; border-radius: 50%; border: 4px solid #fff;
            background: linear-gradient(135deg, #7BC67E, #4CAF50);
            color: #fff; font-size: 28px; font-weight: 900; cursor: pointer;
            box-shadow: 0 8px 24px rgba(76,175,80,0.4), inset 0 2px 0 rgba(255,255,255,0.3);
            transition: transform 0.15s; letter-spacing: 1px;
        }
        .btn-play:hover { transform: scale(1.05); }
        .btn-play:active { transform: scale(0.97); }
        #gameover-screen { background: rgba(0,0,0,0.6); padding: 30px; gap: 16px; backdrop-filter: blur(4px); }
        .go-title { font-size: 40px; font-weight: 900; color: #FF6B6B; text-shadow: 2px 2px 0 rgba(0,0,0,0.2); }
        .go-score { font-size: 28px; font-weight: bold; }
        .go-score span { color: #FFD93D; }
        .go-input-group { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-top: 8px; }
        .go-input {
            width: 220px; padding: 12px 16px; border-radius: 12px;
            border: 3px solid #C4A070; background: rgba(255,255,255,0.9);
            color: #4a3020; font-size: 18px; text-align: center; outline: none;
        }
        .go-input::placeholder { color: #b0a090; }
        .go-input:focus { border-color: #4CAF50; }
        .btn-save {
            width: 220px; padding: 12px; border-radius: 12px; border: none;
            background: linear-gradient(135deg, #7BC67E, #4CAF50);
            color: #fff; font-size: 16px; font-weight: bold; cursor: pointer;
        }
        .btn-save:disabled { opacity: 0.4; cursor: default; }
        .btn-retry {
            padding: 10px 24px; border-radius: 10px; border: 2px solid rgba(255,255,255,0.4);
            background: transparent; color: rgba(255,255,255,0.8); font-size: 14px; cursor: pointer; margin-top: 4px;
        }
        .btn-retry:hover { border-color: #fff; color: #fff; }
        #btn-music {
            position: absolute; top: 8px; left: 8px; z-index: 20;
            width: 36px; height: 36px; border-radius: 50%;
            background: rgba(255,255,255,0.3); border: 2px solid rgba(255,255,255,0.5);
            color: #fff; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>
    <div id="game-wrapper">
        <canvas id="gameCanvas" width="420" height="720"></canvas>
        <button id="btn-music" title="Музыка">&#9835;</button>
        <div id="menu-screen" class="screen">
            <div class="game-title">Фруктики</div>
            <div class="game-subtitle">Объединяй одинаковые фрукты!</div>
            <div class="leaderboard">
                <h2>Топ-10 игроков</h2>
                <table class="lb-table"><thead><tr><th>#</th><th>Игрок</th><th>Очки</th></tr></thead>
                <tbody id="lb-body"><tr><td colspan="3" class="lb-empty">Загрузка...</td></tr></tbody></table>
            </div>
            <button class="btn-play" id="btn-play">ИГРАТЬ</button>
        </div>
        <div id="gameover-screen" class="screen hidden">
            <div class="go-title">Игра окончена!</div>
            <div class="go-score">Очки: <span id="go-score-value">0</span></div>
            <div class="go-input-group">
                <input type="text" class="go-input" id="go-nick" placeholder="Ваш ник" maxlength="12" autocomplete="off">
                <button class="btn-save" id="btn-save">Сохранить результат</button>
            </div>
            <button class="btn-retry" id="btn-retry">Играть снова</button>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/matter-js@0.20.0/build/matter.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script>
    (function() {
        'use strict';

        // === FIREBASE ===
        const firebaseConfig = {
            apiKey: "AIzaSyByZwPwrsLH0oYqOj3ab6Sd-8sXQULyj1w",
            authDomain: "fruite-81d6e.firebaseapp.com",
            databaseURL: "https://fruite-81d6e-default-rtdb.firebaseio.com",
            projectId: "fruite-81d6e",
            storageBucket: "fruite-81d6e.firebasestorage.app",
            messagingSenderId: "76277089995",
            appId: "1:76277089995:web:667a950df2874a81ae7d4e",
            measurementId: "G-WPLTRG52GE"
        };
        let db = null, firebaseReady = false;
        try { firebase.initializeApp(firebaseConfig); db = firebase.database(); firebaseReady = true; } catch(e) {}

        async function loadLeaderboard() {
            const tbody = document.getElementById('lb-body');
            if (!firebaseReady) { tbody.innerHTML = '<tr><td colspan="3" class="lb-empty">Лидерборд недоступен</td></tr>'; return; }
            try {
                const snap = await db.ref('leaderboard').orderByChild('score').limitToLast(10).once('value');
                const entries = []; snap.forEach(c => entries.push(c.val()));
                entries.sort((a,b) => b.score - a.score);
                if (!entries.length) { tbody.innerHTML = '<tr><td colspan="3" class="lb-empty">Пока нет результатов. Будь первым!</td></tr>'; return; }
                tbody.innerHTML = entries.map((e,i) => {
                    const m = i===0?'&#x1F947;':i===1?'&#x1F948;':i===2?'&#x1F949;':(i+1);
                    return `<tr><td>${m}</td><td>${escapeHtml(e.name||'Аноним')}</td><td>${e.score}</td></tr>`;
                }).join('');
            } catch(e) { tbody.innerHTML = '<tr><td colspan="3" class="lb-empty">Ошибка загрузки</td></tr>'; }
        }
        async function saveScore(name, score) {
            if (!firebaseReady) return false;
            try { await db.ref('leaderboard').push({ name: name.trim().substring(0,12), score, timestamp: Date.now() }); return true; } catch(e) { return false; }
        }
        function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

        // === MUSIC (Web Audio API) ===
        let audioCtx = null, musicPlaying = false, musicGain = null;
        const btnMusic = document.getElementById('btn-music');

        function createMusic() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            musicGain = audioCtx.createGain();
            musicGain.gain.value = 0.12;
            musicGain.connect(audioCtx.destination);

            // Cheerful pentatonic melody loop
            const notes = [
                // Bar 1
                261.6, 329.6, 392.0, 329.6,
                // Bar 2
                440.0, 392.0, 329.6, 293.7,
                // Bar 3
                261.6, 293.7, 329.6, 392.0,
                // Bar 4
                440.0, 523.3, 440.0, 392.0,
                // Bar 5
                329.6, 293.7, 261.6, 329.6,
                // Bar 6
                392.0, 440.0, 392.0, 329.6,
                // Bar 7
                293.7, 261.6, 329.6, 293.7,
                // Bar 8
                261.6, 329.6, 392.0, 523.3,
            ];
            const noteDur = 0.3;
            const loopLen = notes.length * noteDur;

            function scheduleLoop(startTime) {
                notes.forEach((freq, i) => {
                    const osc = audioCtx.createOscillator();
                    const env = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = freq;
                    env.gain.setValueAtTime(0, startTime + i * noteDur);
                    env.gain.linearRampToValueAtTime(0.3, startTime + i * noteDur + 0.02);
                    env.gain.linearRampToValueAtTime(0.15, startTime + i * noteDur + noteDur * 0.5);
                    env.gain.linearRampToValueAtTime(0, startTime + i * noteDur + noteDur * 0.95);
                    osc.connect(env);
                    env.connect(musicGain);
                    osc.start(startTime + i * noteDur);
                    osc.stop(startTime + i * noteDur + noteDur);
                });

                // Soft pad chords
                const chords = [
                    [261.6, 329.6, 392.0],
                    [293.7, 370.0, 440.0],
                    [261.6, 329.6, 392.0],
                    [220.0, 293.7, 349.2],
                ];
                const chordDur = loopLen / chords.length;
                chords.forEach((chord, ci) => {
                    chord.forEach(freq => {
                        const osc = audioCtx.createOscillator();
                        const env = audioCtx.createGain();
                        osc.type = 'triangle';
                        osc.frequency.value = freq;
                        env.gain.setValueAtTime(0, startTime + ci * chordDur);
                        env.gain.linearRampToValueAtTime(0.06, startTime + ci * chordDur + 0.1);
                        env.gain.linearRampToValueAtTime(0.04, startTime + ci * chordDur + chordDur * 0.8);
                        env.gain.linearRampToValueAtTime(0, startTime + ci * chordDur + chordDur);
                        osc.connect(env);
                        env.connect(musicGain);
                        osc.start(startTime + ci * chordDur);
                        osc.stop(startTime + ci * chordDur + chordDur);
                    });
                });
            }

            let nextLoop = audioCtx.currentTime + 0.05;
            function loop() {
                if (!musicPlaying) return;
                while (nextLoop < audioCtx.currentTime + 2) {
                    scheduleLoop(nextLoop);
                    nextLoop += loopLen;
                }
                setTimeout(loop, 500);
            }
            musicPlaying = true;
            loop();
        }

        function toggleMusic() {
            if (!musicPlaying) {
                if (!audioCtx) createMusic();
                else { musicPlaying = true; musicGain.gain.value = 0.12; }
                btnMusic.textContent = '\u266B';
                btnMusic.style.opacity = '1';
            } else {
                musicPlaying = false;
                if (musicGain) musicGain.gain.value = 0;
                btnMusic.textContent = '\u266B';
                btnMusic.style.opacity = '0.4';
            }
        }
        btnMusic.addEventListener('click', toggleMusic);

        // === SCREENS ===
        const menuScreen = document.getElementById('menu-screen');
        const gameoverScreen = document.getElementById('gameover-screen');
        const btnPlay = document.getElementById('btn-play');
        const btnRetry = document.getElementById('btn-retry');
        const btnSave = document.getElementById('btn-save');
        const goNick = document.getElementById('go-nick');
        const goScoreValue = document.getElementById('go-score-value');

        function showMenu() { menuScreen.classList.remove('hidden'); gameoverScreen.classList.add('hidden'); canvas.style.pointerEvents = 'none'; loadLeaderboard(); }
        function showGame() { menuScreen.classList.add('hidden'); gameoverScreen.classList.add('hidden'); canvas.style.pointerEvents = 'auto'; }
        function showGameOver(score) {
            goScoreValue.textContent = score; goNick.value = localStorage.getItem('fruitNick') || '';
            btnSave.disabled = false; btnSave.textContent = 'Сохранить результат';
            gameoverScreen.classList.remove('hidden'); canvas.style.pointerEvents = 'none';
            setTimeout(() => goNick.focus(), 100);
        }

        btnPlay.addEventListener('click', () => {
            if (!audioCtx) createMusic();
            showGame(); restartGame(); startGameLoop();
        });
        btnRetry.addEventListener('click', () => { showGame(); restartGame(); });
        btnSave.addEventListener('click', async () => {
            const nick = goNick.value.trim();
            if (!nick) { goNick.focus(); return; }
            btnSave.disabled = true; btnSave.textContent = 'Сохраняю...';
            localStorage.setItem('fruitNick', nick);
            await saveScore(nick, state.score); showMenu();
        });
        goNick.addEventListener('keydown', e => { if (e.key === 'Enter') btnSave.click(); });

        // === MATTER.JS ===
        const { Engine, Bodies, Composite, Events } = Matter;
        const CANVAS_W = 420, CANVAS_H = 720;
        const WALL_T = 16, JAR_LEFT = 55, JAR_RIGHT = 365, JAR_BOTTOM = 620, JAR_TOP = 180;
        const DANGER_Y = 195, DROP_Y = 110, DROP_COOLDOWN = 450, GAME_OVER_DELAY = 2500;
        const FRUITS = [
            { name:'Вишня',    r:16, pts:3,  body:'#E74C3C', face:'#C0392B', cheek:'#FF8A80' },
            { name:'Клубника', r:23, pts:6,  body:'#E91E63', face:'#C2185B', cheek:'#F48FB1' },
            { name:'Виноград', r:31, pts:10, body:'#9B59B6', face:'#7B1FA2', cheek:'#CE93D8' },
            { name:'Апельсин', r:40, pts:15, body:'#F39C12', face:'#E67E22', cheek:'#FFCC80' },
            { name:'Яблоко',   r:50, pts:21, body:'#66BB6A', face:'#43A047', cheek:'#A5D6A7' },
            { name:'Персик',   r:62, pts:50, body:'#F8BBD0', face:'#EC407A', cheek:'#FCE4EC' },
        ];
        const SPAWN_WEIGHTS = [40,30,20,10], SPAWN_TOTAL = 100;
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // === SPRITE CACHE ===
        const spriteCache = [];
        function createSpriteCache() {
            for (let i = 0; i < FRUITS.length; i++) {
                const f = FRUITS[i], size = (f.r+12)*2;
                const oc = document.createElement('canvas');
                oc.width = size; oc.height = size;
                const c = oc.getContext('2d');
                const cx = size/2, cy = size/2, r = f.r;

                // Body with outline
                c.beginPath(); c.arc(cx, cy, r, 0, Math.PI*2);
                const g = c.createRadialGradient(cx-r*0.25, cy-r*0.25, r*0.1, cx, cy, r);
                g.addColorStop(0, lighten(f.body, 30)); g.addColorStop(1, f.body);
                c.fillStyle = g; c.fill();
                c.strokeStyle = darken(f.body, 30); c.lineWidth = 2.5; c.stroke();

                // Cheek blush
                c.beginPath(); c.arc(cx - r*0.4, cy + r*0.15, r*0.2, 0, Math.PI*2);
                c.fillStyle = f.cheek; c.globalAlpha = 0.5; c.fill();
                c.beginPath(); c.arc(cx + r*0.4, cy + r*0.15, r*0.2, 0, Math.PI*2);
                c.fill(); c.globalAlpha = 1;

                // Eyes
                const eyeY = cy - r*0.1, eyeX = r*0.22;
                c.fillStyle = '#2c1810';
                c.beginPath(); c.arc(cx-eyeX, eyeY, r*0.09, 0, Math.PI*2); c.fill();
                c.beginPath(); c.arc(cx+eyeX, eyeY, r*0.09, 0, Math.PI*2); c.fill();
                // Eye shine
                c.fillStyle = '#fff';
                c.beginPath(); c.arc(cx-eyeX+r*0.03, eyeY-r*0.04, r*0.04, 0, Math.PI*2); c.fill();
                c.beginPath(); c.arc(cx+eyeX+r*0.03, eyeY-r*0.04, r*0.04, 0, Math.PI*2); c.fill();

                // Mouth - cute smile
                c.beginPath();
                c.arc(cx, cy + r*0.15, r*0.15, 0.1*Math.PI, 0.9*Math.PI);
                c.strokeStyle = '#2c1810'; c.lineWidth = Math.max(1.5, r*0.05); c.lineCap = 'round'; c.stroke();

                // Leaf/stem on top
                if (i !== 2) { // not grape
                    c.beginPath(); c.moveTo(cx, cy-r*0.9); c.lineTo(cx+r*0.05, cy-r*1.15);
                    c.strokeStyle = '#5D4037'; c.lineWidth = 2; c.lineCap = 'round'; c.stroke();
                    c.beginPath(); c.ellipse(cx+r*0.2, cy-r*1.05, r*0.2, r*0.08, 0.4, 0, Math.PI*2);
                    c.fillStyle = '#66BB6A'; c.fill();
                } else {
                    // Grape stem
                    c.beginPath(); c.moveTo(cx, cy-r*0.9); c.lineTo(cx, cy-r*1.15);
                    c.strokeStyle = '#5D4037'; c.lineWidth = 2; c.stroke();
                    c.beginPath(); c.ellipse(cx+r*0.15, cy-r*1.1, r*0.18, r*0.08, 0.3, 0, Math.PI*2);
                    c.fillStyle = '#66BB6A'; c.fill();
                }

                // Highlight
                c.beginPath(); c.arc(cx-r*0.25, cy-r*0.3, r*0.22, 0, Math.PI*2);
                c.fillStyle = 'rgba(255,255,255,0.3)'; c.fill();

                spriteCache.push(oc);
            }
        }

        function lighten(hex, pct) {
            let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
            r = Math.min(255, r + pct); g = Math.min(255, g + pct); b = Math.min(255, b + pct);
            return `rgb(${r},${g},${b})`;
        }
        function darken(hex, pct) {
            let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
            r = Math.max(0, r - pct); g = Math.max(0, g - pct); b = Math.max(0, b - pct);
            return `rgb(${r},${g},${b})`;
        }

        // === PHYSICS ===
        const engine = Engine.create();
        engine.gravity.y = 1.5; engine.positionIterations = 10; engine.velocityIterations = 10;
        const wallOpts = { isStatic:true, friction:0.3, restitution:0.1, label:'wall' };
        const walls = [
            Bodies.rectangle(JAR_LEFT-WALL_T/2, (JAR_TOP+JAR_BOTTOM)/2, WALL_T, JAR_BOTTOM-JAR_TOP+WALL_T, wallOpts),
            Bodies.rectangle(JAR_RIGHT+WALL_T/2, (JAR_TOP+JAR_BOTTOM)/2, WALL_T, JAR_BOTTOM-JAR_TOP+WALL_T, wallOpts),
            Bodies.rectangle((JAR_LEFT+JAR_RIGHT)/2, JAR_BOTTOM+WALL_T/2, JAR_RIGHT-JAR_LEFT+WALL_T, WALL_T, wallOpts),
        ];
        Composite.add(engine.world, walls);

        // === STATE ===
        let state = {
            score:0, currentType:rft(), nextType:rft(), dropX:CANVAS_W/2,
            canDrop:true, isGameOver:false, gameRunning:false,
            aboveLineTimers:new Map(), mergeAnims:[], scaleAnims:new Map(),
        };
        function rft() { let r=Math.random()*SPAWN_TOTAL; for(let i=0;i<SPAWN_WEIGHTS.length;i++){r-=SPAWN_WEIGHTS[i];if(r<=0)return i;}return 0; }

        // === INPUT ===
        function gcp(e) { const rect=canvas.getBoundingClientRect(); const sx=CANVAS_W/rect.width; const cx=e.touches?e.touches[0].clientX:e.clientX; return(cx-rect.left)*sx; }
        canvas.addEventListener('mousemove', e => { if(state.isGameOver||!state.gameRunning)return; const r=FRUITS[state.currentType].r; state.dropX=Math.max(JAR_LEFT+r+2,Math.min(JAR_RIGHT-r-2,gcp(e))); });
        canvas.addEventListener('touchmove', e => { e.preventDefault(); if(state.isGameOver||!state.gameRunning)return; const r=FRUITS[state.currentType].r; state.dropX=Math.max(JAR_LEFT+r+2,Math.min(JAR_RIGHT-r-2,gcp(e))); });
        canvas.addEventListener('click', () => { if(state.gameRunning) drop(); });
        canvas.addEventListener('touchend', e => { e.preventDefault(); if(state.gameRunning) drop(); });

        function drop() {
            if(!state.canDrop||state.isGameOver)return;
            const t=state.currentType, f=FRUITS[t];
            const body=Bodies.circle(state.dropX, DROP_Y, f.r, {restitution:0.2,friction:0.5,density:0.002,label:'fruit',slop:0.01});
            body.fruitType=t; body.isMerging=false; body.createdAt=Date.now();
            Composite.add(engine.world, body);
            state.currentType=state.nextType; state.nextType=rft();
            state.canDrop=false; setTimeout(()=>{state.canDrop=true;}, DROP_COOLDOWN);
        }

        // === MERGE ===
        Events.on(engine, 'collisionStart', ev => {
            for(let i=0;i<ev.pairs.length;i++){
                const{bodyA,bodyB}=ev.pairs[i];
                if(bodyA.label!=='fruit'||bodyB.label!=='fruit')continue;
                if(bodyA.isMerging||bodyB.isMerging)continue;
                if(bodyA.fruitType!==bodyB.fruitType)continue;
                bodyA.isMerging=true; bodyB.isMerging=true;
                const mx=(bodyA.position.x+bodyB.position.x)/2, my=(bodyA.position.y+bodyB.position.y)/2;
                const t=bodyA.fruitType, nt=t+1;
                state.score+=nt<FRUITS.length?FRUITS[nt].pts:50;
                state.mergeAnims.push({x:mx,y:my,startTime:Date.now(),duration:350,color:nt<FRUITS.length?FRUITS[nt].body:'#FFD700',radius:FRUITS[t].r});
                Composite.remove(engine.world,bodyA); Composite.remove(engine.world,bodyB);
                state.aboveLineTimers.delete(bodyA.id); state.aboveLineTimers.delete(bodyB.id);
                if(nt<FRUITS.length){
                    const nf=FRUITS[nt];
                    const nb=Bodies.circle(mx,my,nf.r,{restitution:0.2,friction:0.5,density:0.002,label:'fruit',slop:0.01});
                    nb.fruitType=nt; nb.isMerging=false; nb.createdAt=Date.now();
                    Composite.add(engine.world,nb);
                    state.scaleAnims.set(nb.id,{start:Date.now(),duration:200});
                }
                // Play merge sound
                if(audioCtx && musicPlaying){
                    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
                    o.type='sine'; o.frequency.value=600+nt*100;
                    g.gain.setValueAtTime(0.15,audioCtx.currentTime);
                    g.gain.linearRampToValueAtTime(0,audioCtx.currentTime+0.15);
                    o.connect(g); g.connect(audioCtx.destination);
                    o.start(); o.stop(audioCtx.currentTime+0.15);
                }
            }
        });

        // === GAME OVER ===
        function checkGameOver() {
            const now=Date.now(), bodies=Composite.allBodies(engine.world);
            for(let i=0;i<bodies.length;i++){
                const b=bodies[i];
                if(b.label!=='fruit'||b.isMerging||b.isStatic)continue;
                if(now-b.createdAt<3000)continue;
                const spd=Math.sqrt(b.velocity.x*b.velocity.x+b.velocity.y*b.velocity.y);
                if(spd>2)continue;
                if(b.position.y-(b.circleRadius||FRUITS[b.fruitType].r)<DANGER_Y){
                    if(!state.aboveLineTimers.has(b.id))state.aboveLineTimers.set(b.id,now);
                    else if(now-state.aboveLineTimers.get(b.id)>GAME_OVER_DELAY){state.isGameOver=true;state.gameRunning=false;showGameOver(state.score);return;}
                } else state.aboveLineTimers.delete(b.id);
            }
        }
        function restartGame() {
            Composite.allBodies(engine.world).filter(b=>b.label==='fruit').forEach(b=>Composite.remove(engine.world,b));
            state={score:0,currentType:rft(),nextType:rft(),dropX:CANVAS_W/2,canDrop:true,isGameOver:false,gameRunning:true,aboveLineTimers:new Map(),mergeAnims:[],scaleAnims:new Map()};
        }

        // === RENDER ===
        function render() {
            const now=Date.now();
            ctx.clearRect(0,0,CANVAS_W,CANVAS_H);

            // Sky background
            const sky=ctx.createLinearGradient(0,0,0,JAR_TOP);
            sky.addColorStop(0,'#8BA4D4'); sky.addColorStop(1,'#A8C0E0');
            ctx.fillStyle=sky; ctx.fillRect(0,0,CANVAS_W,JAR_TOP+30);

            // Wooden base
            const wood=ctx.createLinearGradient(0,JAR_BOTTOM,0,CANVAS_H);
            wood.addColorStop(0,'#C4A070'); wood.addColorStop(0.3,'#B8956A'); wood.addColorStop(1,'#8B6F4E');
            ctx.fillStyle=wood; ctx.fillRect(0,JAR_BOTTOM-10,CANVAS_W,CANVAS_H-JAR_BOTTOM+10);
            // Wood grain lines
            ctx.strokeStyle='rgba(139,111,78,0.3)'; ctx.lineWidth=1;
            for(let y=JAR_BOTTOM+15;y<CANVAS_H;y+=18){ ctx.beginPath(); ctx.moveTo(0,y); ctx.bezierCurveTo(100,y-3,300,y+3,CANVAS_W,y-1); ctx.stroke(); }

            if(!state.gameRunning && !state.isGameOver) return;

            // Box - 3D effect
            const bx=JAR_LEFT-8, bw=JAR_RIGHT-JAR_LEFT+16, bt=JAR_TOP-10, bh=JAR_BOTTOM-JAR_TOP+20;
            // Back face
            ctx.fillStyle='#E8DCC8'; ctx.fillRect(bx,bt,bw,bh);
            // Inner gradient
            const ig=ctx.createLinearGradient(bx,bt,bx+bw,bt);
            ig.addColorStop(0,'rgba(0,0,0,0.06)'); ig.addColorStop(0.5,'rgba(0,0,0,0)'); ig.addColorStop(1,'rgba(0,0,0,0.06)');
            ctx.fillStyle=ig; ctx.fillRect(bx,bt,bw,bh);
            // Left wall 3D
            ctx.fillStyle='#D4C8B4';
            ctx.beginPath(); ctx.moveTo(bx,bt); ctx.lineTo(bx-12,bt+15); ctx.lineTo(bx-12,bt+bh+15); ctx.lineTo(bx,bt+bh); ctx.fill();
            // Right wall 3D
            ctx.beginPath(); ctx.moveTo(bx+bw,bt); ctx.lineTo(bx+bw+12,bt+15); ctx.lineTo(bx+bw+12,bt+bh+15); ctx.lineTo(bx+bw,bt+bh); ctx.fill();
            // Front lip
            ctx.fillStyle='#DDD0BC';
            ctx.fillRect(bx-12,bt+bh,bw+24,14);
            // Box outline
            ctx.strokeStyle='#B8A890'; ctx.lineWidth=2;
            ctx.strokeRect(bx,bt,bw,bh);

            // Danger line
            ctx.setLineDash([8,6]); ctx.strokeStyle='rgba(255,100,100,0.3)'; ctx.lineWidth=1.5;
            ctx.beginPath(); ctx.moveTo(JAR_LEFT,DANGER_Y); ctx.lineTo(JAR_RIGHT,DANGER_Y); ctx.stroke();
            ctx.setLineDash([]);

            // Fruits
            const bodies=Composite.allBodies(engine.world);
            for(let i=0;i<bodies.length;i++){
                const b=bodies[i]; if(b.label!=='fruit')continue;
                const t=b.fruitType, spr=spriteCache[t], f=FRUITS[t];
                let sc=1;
                if(state.scaleAnims.has(b.id)){const a=state.scaleAnims.get(b.id);const p=Math.min(1,(now-a.start)/a.duration);sc=0.3+0.7*eOB(p);if(p>=1)state.scaleAnims.delete(b.id);}
                ctx.save(); ctx.translate(b.position.x,b.position.y); ctx.rotate(b.angle); ctx.scale(sc,sc);
                const ss=(f.r+12)*2; ctx.drawImage(spr,-ss/2,-ss/2,ss,ss);
                ctx.restore();
            }

            // Merge anims
            for(let i=state.mergeAnims.length-1;i>=0;i--){
                const a=state.mergeAnims[i], p=(now-a.startTime)/a.duration;
                if(p>=1){state.mergeAnims.splice(i,1);continue;}
                const e=eOQ(p);
                ctx.beginPath(); ctx.arc(a.x,a.y,a.radius*(0.5+e*1.5),0,Math.PI*2);
                ctx.strokeStyle=a.color; ctx.globalAlpha=1-e; ctx.lineWidth=3*(1-e); ctx.stroke(); ctx.globalAlpha=1;
                for(let j=0;j<8;j++){
                    const ang=(j/8)*Math.PI*2, d=a.radius*e*2;
                    ctx.beginPath(); ctx.arc(a.x+Math.cos(ang)*d,a.y+Math.sin(ang)*d,3*(1-e),0,Math.PI*2);
                    ctx.fillStyle=a.color; ctx.globalAlpha=1-e; ctx.fill(); ctx.globalAlpha=1;
                }
            }

            // Drop preview
            if(state.canDrop && !state.isGameOver && state.gameRunning){
                const f=FRUITS[state.currentType], spr=spriteCache[state.currentType], ss=(f.r+12)*2;
                ctx.setLineDash([6,6]); ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=2;
                ctx.beginPath(); ctx.moveTo(state.dropX,DROP_Y+f.r); ctx.lineTo(state.dropX,JAR_BOTTOM); ctx.stroke();
                ctx.setLineDash([]);
                ctx.globalAlpha=0.7; ctx.drawImage(spr,state.dropX-ss/2,DROP_Y-ss/2,ss,ss); ctx.globalAlpha=1;
            }

            // Score cloud
            const scX=CANVAS_W/2, scY=45;
            ctx.fillStyle='rgba(255,255,255,0.9)';
            ctx.beginPath();
            ctx.moveTo(scX-60,scY); ctx.quadraticCurveTo(scX-65,scY-30,scX-35,scY-30);
            ctx.quadraticCurveTo(scX-30,scY-45,scX,scY-38);
            ctx.quadraticCurveTo(scX+30,scY-45,scX+35,scY-30);
            ctx.quadraticCurveTo(scX+65,scY-30,scX+60,scY);
            ctx.quadraticCurveTo(scX+65,scY+20,scX+40,scY+22);
            ctx.quadraticCurveTo(scX+20,scY+30,scX,scY+25);
            ctx.quadraticCurveTo(scX-20,scY+30,scX-40,scY+22);
            ctx.quadraticCurveTo(scX-65,scY+20,scX-60,scY);
            ctx.fill();
            ctx.strokeStyle='#D4C4A0'; ctx.lineWidth=2; ctx.stroke();
            ctx.fillStyle='#5a4030'; ctx.font='bold 24px "Segoe UI",sans-serif'; ctx.textAlign='center';
            ctx.fillText(state.score, scX, scY+8);
            // Trophy icon
            ctx.fillStyle='#F39C12'; ctx.font='14px serif'; ctx.fillText('\uD83C\uDFC6', scX, scY-18);

            // Next fruit
            ctx.fillStyle='rgba(255,255,255,0.85)';
            roundRect(ctx, CANVAS_W-75, 15, 65, 55, 10); ctx.fill();
            ctx.strokeStyle='#D4C4A0'; ctx.lineWidth=1.5; roundRect(ctx, CANVAS_W-75, 15, 65, 55, 10); ctx.stroke();
            ctx.fillStyle='#5a4030'; ctx.font='bold 11px "Segoe UI",sans-serif'; ctx.textAlign='center';
            ctx.fillText('Next', CANVAS_W-42, 29);
            const nf=FRUITS[state.nextType], ns=spriteCache[state.nextType], nss=(nf.r+12)*2, ps=22/nf.r;
            ctx.save(); ctx.translate(CANVAS_W-42,50); ctx.scale(ps,ps); ctx.drawImage(ns,-nss/2,-nss/2,nss,nss); ctx.restore();

            // Evolution chain at bottom
            const chainY=JAR_BOTTOM+25, chainStartX=40;
            ctx.fillStyle='rgba(255,255,255,0.2)';
            roundRect(ctx,20,chainY-15,CANVAS_W-40,35,10); ctx.fill();
            for(let i=0;i<FRUITS.length;i++){
                const x=chainStartX+i*(CANVAS_W-80)/FRUITS.length+15;
                const sp=spriteCache[i], sz=(FRUITS[i].r+12)*2, scale=12/FRUITS[i].r;
                ctx.save(); ctx.translate(x,chainY+2); ctx.scale(scale,scale);
                ctx.drawImage(sp,-sz/2,-sz/2,sz,sz); ctx.restore();
                if(i<FRUITS.length-1){
                    ctx.fillStyle='rgba(255,255,255,0.4)'; ctx.font='10px sans-serif'; ctx.textAlign='center';
                    ctx.fillText('>',x+((CANVAS_W-80)/FRUITS.length)/2,chainY+6);
                }
            }
        }

        function roundRect(c,x,y,w,h,r){ c.beginPath(); c.moveTo(x+r,y); c.lineTo(x+w-r,y); c.quadraticCurveTo(x+w,y,x+w,y+r); c.lineTo(x+w,y+h-r); c.quadraticCurveTo(x+w,y+h,x+w-r,y+h); c.lineTo(x+r,y+h); c.quadraticCurveTo(x,y+h,x,y+h-r); c.lineTo(x,y+r); c.quadraticCurveTo(x,y,x+r,y); c.closePath(); }
        function eOQ(t){return t*(2-t);}
        function eOB(t){const c1=1.70158,c3=c1+1;return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2);}

        // === RESPONSIVE ===
        function resize(){const w=document.getElementById('game-wrapper'),mW=window.innerWidth*0.95,mH=window.innerHeight*0.95,s=Math.min(mW/CANVAS_W,mH/CANVAS_H);w.style.width=(CANVAS_W*s)+'px';w.style.height=(CANVAS_H*s)+'px';}
        window.addEventListener('resize',resize); resize();

        // === LOOP ===
        createSpriteCache();
        let loopStarted=false;
        function startGameLoop(){if(loopStarted)return;loopStarted=true;function gl(){if(state.gameRunning&&!state.isGameOver){Engine.update(engine,1000/60);checkGameOver();}render();requestAnimationFrame(gl);}requestAnimationFrame(gl);}
        showMenu(); startGameLoop();
    })();
    </script>
